<!DOCTYPE html>
<html>
<head>
    <title>S-DES Demo (Binary XOR Version)</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }
        .box {
            background: white;
            width: 400px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            font-family: monospace;
            text-align: left;
            background: #111;
            color: #00ff88;
            padding: 10px;
            border-radius: 8px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>S-DES Encryption (Demo)</h2>

    <input type="text" id="plaintext" placeholder="Enter 8-bit plaintext (e.g. 10101010)" maxlength="8">
    <input type="text" id="key" placeholder="Enter 10-bit key (e.g. 1010000010)" maxlength="10">

    <button onclick="encrypt()">Encrypt</button>

    <div id="output" class="result"></div>
</div>

<script>
function encrypt() {
    let plaintext = document.getElementById("plaintext").value;
    let key = document.getElementById("key").value;
    let output = document.getElementById("output");

    // Validation
    if (!/^[01]{8}$/.test(plaintext)) {
        output.innerText = "❌ Plaintext must be exactly 8 bits (0 and 1 only)";
        return;
    }

    if (!/^[01]{10}$/.test(key)) {
        output.innerText = "❌ Key must be exactly 10 bits (0 and 1 only)";
        return;
    }

    // Take first 8 bits of key (demo purpose)
    let key8 = key.substring(0, 8);

    let ciphertext = "";
    let steps = "=== Encryption Steps ===\n\n";
    steps += "Plaintext : " + plaintext + "\n";
    steps += "Key (8bit): " + key8 + "\n\n";

    // XOR operation
    for (let i = 0; i < 8; i++) {
        let bit = plaintext[i] ^ key8[i];
        ciphertext += bit;
    }

    steps += "Ciphertext: " + ciphertext;

    output.innerText = steps;
}
</script>

</body>
</html>
